# Staging environment - mirrors production configuration
version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - APP_ENV=staging
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/trademaster_staging
      - REDIS_URL=redis://redis:6379/0
      - BINANCE_TESTNET=true
      - PAPER_MODE=true
      - LOG_LEVEL=INFO
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8001
    environment:
      - NODE_ENV=production
    ports:
      - "3001:3000"

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: trademaster_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - staging_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  staging_pgdata:
