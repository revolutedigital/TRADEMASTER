<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <defs>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Icon: stylized candlestick chart -->
  <rect x="4" y="16" width="4" height="16" rx="2" fill="url(#logo-grad)"/>
  <rect x="5" y="12" width="2" height="24" rx="1" fill="url(#logo-grad)" opacity="0.5"/>
  <rect x="12" y="8" width="4" height="24" rx="2" fill="url(#logo-grad)"/>
  <rect x="13" y="4" width="2" height="32" rx="1" fill="url(#logo-grad)" opacity="0.5"/>
  <rect x="20" y="14" width="4" height="18" rx="2" fill="url(#logo-grad)"/>
  <rect x="21" y="10" width="2" height="26" rx="1" fill="url(#logo-grad)" opacity="0.5"/>
  <rect x="28" y="6" width="4" height="20" rx="2" fill="url(#logo-grad)"/>
  <rect x="29" y="2" width="2" height="28" rx="1" fill="url(#logo-grad)" opacity="0.5"/>
  <!-- AI circuit dot -->
  <circle cx="36" cy="12" r="3" fill="#818cf8"/>
  <circle cx="36" cy="12" r="5" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <!-- Text -->
  <text x="46" y="32" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="currentColor">
    <tspan fill="currentColor">Trade</tspan><tspan fill="url(#logo-grad)">Master</tspan>
  </text>
</svg>
