# TradeMaster Disaster Recovery Plan
# RPO: < 1 hour | RTO: < 15 minutes

disaster_recovery:
  classification: tier_1_critical
  
  rpo: 1h  # Recovery Point Objective
  rto: 15m  # Recovery Time Objective
  
  backup_strategy:
    database:
      type: automated
      frequency: hourly
      retention: 30d
      method: pg_dump
      storage: s3://trademaster-backups/postgres/
      encryption: AES-256
      cross_region: true
      regions: [us-east-1, eu-west-1]
      
    redis:
      type: rdb_snapshot
      frequency: 15m
      retention: 7d
      storage: s3://trademaster-backups/redis/
      
    ml_models:
      type: versioned
      storage: s3://trademaster-backups/ml-artifacts/
      retention: 90d
      
    configuration:
      type: git
      repository: https://github.com/revolutedigital/TRADEMASTER
      branch: main

  recovery_procedures:
    total_failure:
      steps:
        - name: "Assess situation"
          action: "Determine scope: partial vs full outage"
          max_duration: 2m
          
        - name: "Activate incident response"
          action: "Notify on-call team, start incident channel"
          max_duration: 1m
          
        - name: "Deploy fresh infrastructure"
          action: "terraform apply -auto-approve"
          max_duration: 5m
          
        - name: "Restore database"
          action: "pg_restore from latest backup"
          max_duration: 5m
          
        - name: "Restore Redis"
          action: "Load latest RDB snapshot"
          max_duration: 1m
          
        - name: "Deploy application"
          action: "railway up --detach"
          max_duration: 3m
          
        - name: "Verify health"
          action: "curl /api/v1/system/health/detailed"
          max_duration: 1m
          
        - name: "Resume trading"
          action: "Enable trading engine via admin API"
          max_duration: 1m

    database_failure:
      steps:
        - name: "Failover to replica"
          action: "Promote read replica to primary"
          max_duration: 2m
        - name: "Update connection strings"
          action: "Update DATABASE_URL environment variable"
          max_duration: 1m
        - name: "Verify data integrity"
          action: "Run data quality checks"
          max_duration: 3m

    exchange_api_failure:
      steps:
        - name: "Activate circuit breaker"
          action: "Automatic via ServiceCircuitBreaker"
          max_duration: 0m
        - name: "Pause trading engine"
          action: "POST /api/v1/admin/emergency-stop"
          max_duration: 1m
        - name: "Monitor exchange status"
          action: "Check Binance status page"
          max_duration: 5m
        - name: "Resume when stable"
          action: "POST /api/v1/admin/flags with trading_enabled=true"
          max_duration: 1m

  testing:
    frequency: monthly
    scope:
      - database_restore_drill
      - failover_test
      - full_recovery_simulation
    last_test: null
    next_test: null
    
  contacts:
    primary_oncall: "ops@trademaster.app"
    secondary_oncall: "dev@trademaster.app"
    management: "cto@trademaster.app"
