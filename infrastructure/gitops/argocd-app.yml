apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trademaster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/revolutedigital/TRADEMASTER
    targetRevision: main
    path: infrastructure/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: trademaster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
