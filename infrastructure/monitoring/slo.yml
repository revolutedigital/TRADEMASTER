# Service Level Objectives for TradeMaster
# Used by monitoring dashboards and alerting

slos:
  - name: API Availability
    description: "Percentage of non-5xx responses"
    target: 99.9%
    window: 30d
    indicator:
      type: availability
      query: "rate(http_requests_total{status!~'5..'}[5m]) / rate(http_requests_total[5m])"
    alert_burn_rate:
      - window: 1h
        threshold: 14.4  # 2% budget consumed in 1h
      - window: 6h
        threshold: 6.0   # 5% budget consumed in 6h

  - name: API Latency p95
    description: "95th percentile response time under 500ms"
    target: 99.0%
    window: 30d
    indicator:
      type: latency
      query: "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))"
      threshold_ms: 500

  - name: Trading Execution Success
    description: "Percentage of orders that fill successfully"
    target: 99.5%
    window: 7d
    indicator:
      type: success_rate
      query: "rate(orders_filled_total[1h]) / rate(orders_submitted_total[1h])"

  - name: ML Prediction Latency
    description: "ML inference under 200ms p99"
    target: 99.0%
    window: 7d
    indicator:
      type: latency
      query: "histogram_quantile(0.99, rate(ml_inference_duration_seconds_bucket[5m]))"
      threshold_ms: 200

  - name: Data Freshness
    description: "Market data no older than 2x interval"
    target: 99.5%
    window: 7d
    indicator:
      type: freshness
      query: "max(data_freshness_seconds) < 7200"
